# Configuración Nginx para despliegue con systemd (sin Docker)
# Copiar a /etc/nginx/sites-available/nomenclatura y enlazar a sites-enabled

server {
    listen 80;
    server_name nomenclatura.example.com;  # Cambiar al dominio real
    root /var/www/nomenclatura-app;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Caché para activos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: redirigir todas las rutas a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
